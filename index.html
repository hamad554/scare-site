<!DOCTYPE html>
<html>

<body style="margin:0; background:black; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden;">

<button id="startBtn"
    style="font-size:40px; padding:20px 60px; cursor:pointer; z-index:2; position:relative;">
اقبل
</button>

<script>
const startBtn = document.getElementById("startBtn");

startBtn.addEventListener("click", () => {
    // فل سكرين
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
    }

    // HTML الجديد للفيديو + الصوت
    document.body.innerHTML = `
    <div style="position:relative; width:90vw; height:90vh; display:flex; justify-content:center; align-items:center;">
        <video id="scareVideo" autoplay loop playsinline 
            style="width:100%; height:100%; object-fit:cover; border-radius:10px; box-shadow:0 0 20px #000;">
            <source src="scare.mp4" type="video/mp4">
        </video>
        <audio id="scareAudio">
            <source src="scare.mp3" type="audio/mp3">
        </audio>
    </div>
    `;

    // تشغيل الصوت مباشرة بعد التفاعل
    const audio = document.getElementById("scareAudio");
    audio.play().catch((e) => {
        console.log("لم يتم تشغيل الصوت: ", e);
    });
});
</script>

</body>
</html>
